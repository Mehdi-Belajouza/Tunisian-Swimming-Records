<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swimming Records Comparison</title>
    <style>
        :root {
            --bg-top: #cbeafc; 
            --bg-mid: #a0d8f7; 
            --bg-bottom: #76c6f2; 
            --accent-main: #005b9f; 
            --accent-dark: #004275;
            --accent-light: #0077cc;
            --card-bg: #ffffff; 
            --text-main: #102a43; 
            --text-muted: #334e68;
            --shadow-sm: 0 4px 6px -1px rgba(0, 91, 159, 0.06), 0 2px 4px -1px rgba(0, 91, 159, 0.04);
            --shadow-md: 0 10px 15px -3px rgba(0, 91, 159, 0.08), 0 4px 6px -2px rgba(0, 91, 159, 0.05);
            --shadow-lg: 0 20px 25px -5px rgba(0, 91, 159, 0.12), 0 10px 10px -5px rgba(0, 91, 159, 0.06);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, var(--bg-top) 0%, var(--bg-mid) 50%, var(--bg-bottom) 100%);
            color: var(--text-main);
            min-height: 100vh;
            padding: 20px;
            line-height: 1.7;
        }

        .header {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 40px 30px;
            margin-bottom: 30px;
            box-shadow: var(--shadow-md);
            max-width: 1600px;
            margin: 0 auto 30px;
        }

        .header h1 {
            color: var(--text-main);
            margin-bottom: 15px;
            font-size: 2.8em;
            font-weight: 800;
            letter-spacing: -1px;
        }

        .header .breadcrumb {
            color: var(--text-muted);
            margin-bottom: 25px;
            font-size: 1.1em;
        }

        .header .breadcrumb a {
            color: var(--accent-light);
            text-decoration: none;
            font-weight: 700;
            transition: color 0.3s;
        }

        .header .breadcrumb a:hover {
            color: var(--accent-dark);
        }

        .tabs {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .tab {
            padding: 12px 30px;
            border: 2px solid transparent;
            background: #f1f5f9;
            color: var(--text-main);
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 700;
            font-size: 1.05em;
        }

        .tab:hover {
            transform: translateY(-2px);
            background: #e2e8f0;
            box-shadow: var(--shadow-sm);
        }

        .tab.active {
            background: var(--accent-main);
            color: white;
            box-shadow: var(--shadow-md);
        }

        .filters {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: var(--shadow-md);
            max-width: 1600px;
            margin: 0 auto 30px;
        }

        .filter-group {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-group label {
            font-weight: 700;
            color: var(--text-main);
            font-size: 1.1em;
        }

        .filter-group select {
            padding: 12px 20px;
            border: 2px solid #cbd5e1;
            border-radius: 12px;
            font-size: 1.05em;
            cursor: pointer;
            color: var(--text-main);
            background: white;
            transition: border-color 0.3s;
            font-family: inherit;
        }

        .filter-group select:focus {
            outline: none;
            border-color: var(--accent-main);
        }

        .comparison-container {
            max-width: 1600px;
            margin: 0 auto;
            background: var(--card-bg);
            border-radius: 24px;
            padding: 35px;
            box-shadow: var(--shadow-lg);
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            font-size: 14px;
        }

        thead {
            background: var(--text-main);
            color: white;
        }

        thead th {
            padding: 18px 15px;
            text-align: left;
            font-weight: 700;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Keep region specific colors for headers to help visually distinguish */
        thead th.tunisia-col { background: #005b9f; } /* Updated to match new theme */
        thead th.egypt-col { background: #b45309; }
        thead th.arab-col { background: #047857; }
        thead th.africa-col { background: #d97706; }
        thead th.world-col { background: #1d4ed8; }

        .tunisia-highlight {
            background: #f0f9ff !important;
            border-left: 4px solid var(--accent-light);
        }

        .tunisia-highlight:hover {
            background: #e0f2fe !important;
        }

        .country-flag {
            font-size: 1.3em;
            margin-right: 8px;
            vertical-align: middle;
        }

        tbody tr {
            border-bottom: 1px solid #e2e8f0;
            transition: background 0.2s ease;
        }

        tbody tr:nth-child(even) {
            background: #f8fafc;
        }

        tbody tr:hover {
            background: #f1f5f9;
        }

        tbody td {
            padding: 16px 15px;
            font-size: 14px;
            color: var(--text-muted);
        }

        .event-cell {
            font-weight: 800;
            color: var(--text-main);
            font-size: 15px;
            min-width: 180px;
        }

        .time-cell {
            font-weight: 800;
            font-size: 16px;
            color: var(--text-main);
        }

        .record-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .swimmer-name {
            font-weight: 700;
            color: var(--accent-dark);
            font-size: 14px;
        }

        .swimmer-name-large {
            font-weight: 700;
            color: #2c3e50;
            font-size: 16px;
        }

        .record-details {
            font-size: 11px;
            color: #666;
        }

        .gap-indicator {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            margin-top: 3px;
        }

        .gap-small { background: #d4edda; color: #155724; }
        .gap-medium { background: #fff3cd; color: #856404; }
        .gap-large { background: #f8d7da; color: #721c24; }
        .gap-excellent { background: #d1ecf1; color: #0c5460; }

        .legend {
            display: flex;
            gap: 20px;
            margin-top: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .legend-color {
            width: 30px;
            height: 20px;
            border-radius: 4px;
        }

        .back-button {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 15px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
            transition: all 0.3s;
            z-index: 1000;
        }

        .back-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.6);
        }

        .loading {
            text-align: center;
            padding: 60px;
            font-size: 18px;
            color: #666;
        }

        .motivation-banner {
            background: linear-gradient(135deg, #ffd700 0%, #ffed4e 100%);
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.3);
        }

        .motivation-banner h3 {
            color: #333;
            font-size: 1.3em;
            margin-bottom: 5px;
        }

        .motivation-banner p {
            color: #555;
            font-size: 1em;
        }

        .section-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 20px;
            margin-top: 30px;
            margin-bottom: 10px;
            border-radius: 8px;
            font-size: 1.3em;
            font-weight: 600;
        }

        /* Missing info indicator */
        .missing-info {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 18px;
            height: 18px;
            background: #ff9800;
            color: white;
            border-radius: 50%;
            font-size: 11px;
            font-weight: bold;
            margin-left: 5px;
            cursor: help;
            position: relative;
        }

        .missing-info:hover::after {
            content: attr(data-tooltip);
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 11px;
            white-space: nowrap;
            z-index: 1000;
            margin-bottom: 5px;
        }

        /* Swimming style icons */
        .style-icon {
            font-size: 1.1em;
            margin-right: 6px;
            opacity: 0.7;
        }

        /* Record age indicators */
        .record-age {
            font-size: 1em;
            margin-left: 5px;
        }

        /* Search box */
        .search-box {
            margin: 20px 0;
            padding: 0 20px;
        }

        .search-box input {
            width: 100%;
            max-width: 400px;
            padding: 12px 20px;
            font-size: 14px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            transition: all 0.3s;
        }

        .search-box input:focus {
            outline: none;
            border-color: #e30a17;
            box-shadow: 0 0 10px rgba(227, 10, 23, 0.1);
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8em;
            }

            table {
                font-size: 11px;
            }

            thead th, tbody td {
                padding: 8px 6px;
            }

           .back-button {
                bottom: 20px;
                right: 20px;
                padding: 12px 20px;
                font-size: 14px;
            }
        }
    </style>
</head>

            <a href="index.html">← Back to Home</a>
        </div>

            <div class="tab" data-view="arab" onclick="switchView('arab')">vs Arab Records</div>

    <div class="comparison-container">

            <div class="legend-item">

                <span>African Record</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background: #0066cc;"></div>
                <span>World Record</span>
            </div>
            <div class="legend-item">
                <div class="legend-color gap-small"></div>
                <span>Gap < 2%</span>
            </div>
            <div class="legend-item">

            </div>
            <div class="legend-item">
                <div class="legend-color gap-large"></div>
                <span>Gap > 5%</span>
            </div>

    </div>

        function getFlag(country) {
            if (!country) return ''; // Return empty string, not globe
            // Try to match the country name
            for (const [name, flag] of Object.entries(countryFlags)) {
                if (country.toLowerCase().includes(name.toLowerCase()) || name.toLowerCase().includes(country.toLowerCase())) {
                    return flag;
                }
            }
            return ''; // Return empty string if no match, we'll show globe separately
        }

        function getCountryFromClub(club) {
            // Extract country name (usually the club field contains the country)
            if (!club || club === '-') return '';
            return club;
        }

        function isRelay(event) {
            // Check if event is a relay (has multiple swimmers)
            return event.toLowerCase().includes('relay') || event.includes('×') || event.includes('x');
        }

        function getStyleIcon(event) {
            // Return emoji icon based on swimming style
            const eventLower = event.toLowerCase();
            if (eventLower.includes('freestyle')) return '🏊';
            if (eventLower.includes('backstroke')) return '🏊‍♂️';
            if (eventLower.includes('breaststroke')) return '🐸';
            if (eventLower.includes('butterfly')) return '🦋';
            if (eventLower.includes('medley')) return '🎯';
            return '🏊'; // default
        }

        function getMissingInfoIndicator(record) {
            // Check what information is missing
            const missingFields = [];
            if (!record.date || record.date === 'Date unknown') missingFields.push('date');
            if (!record.meet || record.meet === 'Meet unknown') missingFields.push('competition');
            if (!record.location || record.location === 'Location unknown') missingFields.push('location');
            
            if (missingFields.length === 0) return '';
            
            const tooltip = `Missing: ${missingFields.join(', ')}`;
            return `<span class="missing-info" data-tooltip="${tooltip}">!</span>`;
        }

        function getRecordAge(dateStr) {
            // Return an emoji indicator based on record age
            if (!dateStr || dateStr === 'Date unknown') return '';
            
            try {
                // Parse date (format: "DD Month YYYY" or "Month YYYY")
                const dateParts = dateStr.split(' ');
                let year;
                if (dateParts.length >= 3) {
                    year = parseInt(dateParts[2]);
                } else if (dateParts.length === 2) {
                    year = parseInt(dateParts[1]);
                } else {
                    return '';
                }
                
                const currentYear = new Date().getFullYear();
                const age = currentYear - year;
                
                if (age <= 2) return '<span class="record-age" title="Recent record (last 2 years)">🔥</span>';  // Fresh/hot
                if (age <= 5) return '<span class="record-age" title="Recent record (last 5 years)">⭐</span>';  // Recent
                if (age <= 10) return '<span class="record-age" title="Aging record (5-10 years)">⏳</span>'; // Aging
                return '<span class="record-age" title="Old record (10+ years)">💀</span>'; // Very old
            } catch (e) {
                return '';
            }
        }

        async function loadRecords() {
            try {
                const [tunisiaData, egyptData, arabData, africaData, worldData] = await Promise.all([
                    fetch('../data/tunisia/tunisia_swimming_records.json').then(r => r.json()),
                    fetch('../data/arab_countries/egypt_swimming_records.json').then(r => r.json()),
                    fetch('../data/arab_countries/arab_swimming_records.json').then(r => r.json()).catch(() => null),
                    fetch('../data/africa/africa_swimming_records.json').then(r => r.json()),
                    fetch('../data/world/world_swimming_records.json').then(r => r.json())
                ]);
                
                tunisiaRecords = flattenRecords(tunisiaData);
                egyptRecords = flattenRecords(egyptData);
                arabRecords = arabData ? flattenRecords(arabData) : [];
                africaRecords = flattenRecords(africaData);
                worldRecords = flattenRecords(worldData);
                
                console.log(`Loaded ${tunisiaRecords.length} Tunisia, ${egyptRecords.length} Egypt, ${arabRecords.length} Arab, ${africaRecords.length} Africa, ${worldRecords.length} World records`);
                
                switchView(initialView);
            } catch (error) {
                document.getElementById('recordsDisplay').innerHTML = 
                    '<div class="loading">Error loading records. Run: python scrape_all_records.py</div>';
                console.error('Error:', error);
            }
        }

        function flattenRecords(data) {
            const records = [];
            for (const [courseType, categories] of Object.entries(data)) {
                for (const [category, recordList] of Object.entries(categories)) {
                    records.push(...recordList);
                }
            }
            return records;
        }

        function timeToSeconds(timeStr) {
            if (!timeStr) return Infinity;
            const parts = timeStr.split(':');
            let seconds = 0;
            
            if (parts.length === 1) {
                seconds = parseFloat(parts[0]);
            } else if (parts.length === 2) {
                seconds = parseInt(parts[0]) * 60 + parseFloat(parts[1]);
            } else if (parts.length === 3) {
                // Check if this might be a formatting error (M:SS:ms instead of M:SS.ms)
                // Swimming events never take hours, so if we have 3 parts and the first is < 20,
                // treat it as minutes:seconds:milliseconds instead of hours:minutes:seconds
                if (parseInt(parts[0]) < 20) {
                    // Convert to M:SS.ms format
                    seconds = parseInt(parts[0]) * 60 + parseInt(parts[1]) + parseFloat('0.' + parts[2]);
                } else {
                    // Genuine hours format (very unusual in swimming)
                    seconds = parseInt(parts[0]) * 3600 + parseInt(parts[1]) * 60 + parseFloat(parts[2]);
                }
            }
            
            return seconds;
        }

        function calculateGap(tunisiaTime, compareTime) {
            const tunSec = timeToSeconds(tunisiaTime);
            const compSec = timeToSeconds(compareTime);
            
            if (!isFinite(tunSec) || !isFinite(compSec)) return null;
            
            const diff = tunSec - compSec;
            const percentage = ((diff / compSec) * 100);
            
            return {
                seconds: diff.toFixed(2),
                percentage: percentage.toFixed(2),
                isFaster: diff < 0,
                isSlower: diff > 0
            };
        }

        function getGapClass(percentage) {
            const pct = Math.abs(parseFloat(percentage));
            if (pct < 2) return 'gap-small';
            if (pct < 5) return 'gap-medium';
            return 'gap-large';
        }

        function findMatchingRecord(event, course, category, recordSet) {
            // Normalize event names to match Python scraper normalization
            const normalizeEvent = (e) => {
                // Replace multiplication signs with 'x'
                e = e.replace(/×/g, 'x').replace(/Ã—/g, 'x').replace(/â€"/g, 'x');
                // Remove extra spaces
                e = e.replace(/\s+/g, ' ');
                // Standardize spacing around 'x'
                e = e.replace(/\s*x\s*/g, 'x');
                // Standardize meter notation (100 m -> 100m)
                e = e.replace(/(\d+)\s*m\s/g, '$1m ');
                // Clean up
                e = e.replace(/\s+/g, ' ').trim();
                return e;
            };
            const normalizedEvent = normalizeEvent(event);
            
            return recordSet.find(r => 
                normalizeEvent(r.event) === normalizedEvent && 
                r.course === course && 
                r.category === category
            );
        }

        function switchView(view) {
            currentView = view;
            
            document.querySelectorAll('.tab').forEach(tab => {
                tab.classList.remove('active');
                if (tab.dataset.view === view) {
                    tab.classList.add('active');
                }
            });

            const titles = {
                'tunisia': '🇹🇳 Tunisia Swimming Records',
                'egypt': '🇹🇳 Tunisia vs 🇪🇬 Egypt',
                'arab': 'Tunisia vs Arab Records',
                'africa': '🌍 Tunisia vs African Records',
                'world': '🌎 Tunisia vs World Records'
            };

            const motivations = {
                'tunisia': {
                    title: '�🇳 Tunisia National Records',
                    text: 'Official national swimming records for all events'
                },
                'egypt': {
                    title: '🇹🇳 vs 🇪🇬 Tunisia vs Egypt',
                    text: 'Comparison of national records between Tunisia and Egypt'
                },
                'arab': {
                    title: 'Arab Records Comparison',
                    text: 'Tunisia vs Best Records from 22 Arab Nations'
                },
                'africa': {
                    title: '🌍 African Records Comparison',
                    text: 'Tunisia vs Continental African Records'
                },
                'world': {
                    title: '🌎 World Records Comparison',
                    text: 'Tunisia national records compared with world records'
                }
            };

            document.getElementById('pageTitle').textContent = titles[view];
            document.getElementById('motivationBanner').innerHTML = `
                <h3>${motivations[view].title}</h3>
                <p>${motivations[view].text}</p>
            `;

            filterRecords();
        }

        function filterRecords() {
            const courseFilter = document.getElementById('courseFilter').value;
            const categoryFilter = document.getElementById('categoryFilter').value;
            const eventTypeFilter = document.getElementById('eventTypeFilter').value;
            const searchBox = document.getElementById('searchBox');
            const searchTerm = searchBox ? searchBox.value.toLowerCase() : '';

            let filtered = tunisiaRecords;

            if (courseFilter !== 'all') {
                filtered = filtered.filter(r => r.course === courseFilter);
            }

            if (categoryFilter !== 'all') {
                filtered = filtered.filter(r => r.category === categoryFilter);
            }

            if (eventTypeFilter !== 'all') {
                filtered = filtered.filter(r => r.event.toLowerCase().includes(eventTypeFilter));
            }

            // Search functionality
            if (searchTerm) {
                filtered = filtered.filter(r => 
                    r.event.toLowerCase().includes(searchTerm) ||
                    r.swimmer.toLowerCase().includes(searchTerm) ||
                    (r.location && r.location.toLowerCase().includes(searchTerm)) ||
                    (r.meet && r.meet.toLowerCase().includes(searchTerm)) ||
                    (r.club && r.club.toLowerCase().includes(searchTerm))
                );
            }

            displayRecords(filtered);
        }

        function displayRecords(records) {
            if (records.length === 0) {
                document.getElementById('recordsDisplay').innerHTML = 
                    '<div class="loading">No records found matching your filters.</div>';
                return;
            }

            const grouped = {};
            records.forEach(record => {
                const key = `${record.course} - ${record.category}`;
                if (!grouped[key]) grouped[key] = [];
                grouped[key].push(record);
            });

            let html = '';

            for (const [group, groupRecords] of Object.entries(grouped)) {
                html += `<div class="section-header">${group}</div>`;
                html += '<table>';
                
                if (currentView === 'tunisia') {
                    html += `
                        <thead>
                            <tr>
                                <th>Event</th>
                                <th class="tunisia-col">🇹🇳 Time</th>
                                <th>Swimmer</th>
                                <th>Date</th>
                                <th>Location</th>
                            </tr>
                        </thead>
                        <tbody>
                    `;

                    groupRecords.forEach(record => {
                        const swimmerClass = isRelay(record.event) ? 'swimmer-name' : 'swimmer-name-large';
                        const styleIcon = getStyleIcon(record.event);
                        const missingInfo = getMissingInfoIndicator(record);
                        const ageIndicator = getRecordAge(record.date);
                        html += `
                            <tr>
                                <td class="event-cell"><span class="style-icon">${styleIcon}</span>${record.event}</td>
                                <td class="time-cell" style="color: #e30a17;">${record.time}</td>
                                <td>
                                    <div class="${swimmerClass}" style="margin-bottom: 4px;">${record.swimmer}</div>
                                    <div class="record-details" style="font-size: 11px; color: #666;">
                                        <span class="country-flag">🇹🇳</span>Tunisia
                                        ${record.date ? ' • ' + record.date : ''}
                                        ${missingInfo}
                                    </div>
                                </td>
                                <td style="font-size: 12px;">${record.date || 'Date unknown'}${ageIndicator}</td>
                                <td style="font-size: 12px;">${record.location || 'Location unknown'}</td>
                            </tr>
                        `;
                    });
                } else {
                    // Comparison view
                    let compareSet, compareName, compareCol, compareColor;
                    
                    if (currentView === 'egypt') {
                        compareSet = egyptRecords;
                        compareName = '🇪🇬 Egypt';
                        compareCol = 'egypt-col';
                        compareColor = '#C09300';  // Gold color for Egypt
                    } else if (currentView === 'arab') {
                        compareSet = arabRecords;
                        compareName = 'Arab Records';
                        compareCol = 'arab-col';
                        compareColor = '#00843D';  // Green for Arab
                    } else if (currentView === 'africa') {
                        compareSet = africaRecords;
                        compareName = '🌍 Africa';
                        compareCol = 'africa-col';
                        compareColor = '#FF8C00';  // Africa orange
                    } else {
                        compareSet = worldRecords;
                        compareName = '🌎 World';
                        compareCol = 'world-col';
                        compareColor = '#0066cc';  // World blue
                    }

                    html += `
                        <thead>
                            <tr>
                                <th>Event</th>
                                <th class="tunisia-col">🇹🇳 Tunisia</th>
                                <th class="${compareCol}">${compareName}</th>
                                <th>Gap Analysis</th>
                            </tr>
                        </thead>
                        <tbody>
                    `;

                    groupRecords.forEach(tunRecord => {
                        const compareRecord = findMatchingRecord(
                            tunRecord.event, 
                            tunRecord.course, 
                            tunRecord.category,
                            compareSet
                        );

                        // Check if Tunisia holds the record (same time) OR is leading (faster time)
                        const tunisiaHoldsRecord = compareRecord && 
                            tunRecord.time === compareRecord.time;
                        const tunisiaIsLeading = compareRecord && 
                            timeToSeconds(tunRecord.time) <= timeToSeconds(compareRecord.time);

                        let gapHtml = '<span style="color: #999;">No data</span>';
                        
                        if (compareRecord) {
                            const gap = calculateGap(tunRecord.time, compareRecord.time);
                            if (gap) {
                                if (tunisiaHoldsRecord) {
                                    const recordType = currentView === 'egypt' ? 'same record as Egypt' : 
                                                      currentView === 'arab' ? 'Arab' :
                                                      currentView === 'africa' ? 'African' : 'World';
                                    gapHtml = `
                                        <span class="gap-indicator gap-excellent" style="background: #d4edda; color: #155724;">
                                            🏆 Tunisia holds the ${recordType} record!
                                        </span>
                                    `;
                                } else if (gap.isFaster) {
                                    // Tunisia is faster
                                    const competitorName = currentView === 'egypt' ? 'Egypt' : 
                                                          currentView === 'arab' ? 'Arab World' :
                                                          currentView === 'africa' ? 'Africa' : 'World';
                                    gapHtml = `
                                        <span class="gap-indicator gap-excellent" style="background: #d4edda; color: #155724;">
                                            🚀 Tunisia is ${Math.abs(gap.seconds)}s faster than ${competitorName}!
                                        </span>
                                    `;
                                } else {
                                    const gapClass = getGapClass(gap.percentage);
                                    const sign = gap.isSlower ? '+' : '';
                                    gapHtml = `
                                        <span class="gap-indicator ${gapClass}">
                                            ${sign}${gap.seconds}s (${sign}${gap.percentage}%)
                                        </span>
                                    `;
                                }
                            }
                        }

                        const rowClass = tunisiaIsLeading ? ' class="tunisia-highlight"' : '';
                        const compareCountry = compareRecord ? getCountryFromClub(compareRecord.club) : '';
                        const compareFlag = compareRecord ? getFlag(compareCountry) : '';
                        const tunisianSwimmerClass = isRelay(tunRecord.event) ? 'swimmer-name' : 'swimmer-name-large';
                        const styleIcon = getStyleIcon(tunRecord.event);
                        const tunMissingInfo = getMissingInfoIndicator(tunRecord);
                        const compareMissingInfo = compareRecord ? getMissingInfoIndicator(compareRecord) : '';
                        const tunAgeIndicator = getRecordAge(tunRecord.date);
                        const compareAgeIndicator = compareRecord ? getRecordAge(compareRecord.date) : '';

                        html += `
                            <tr${rowClass}>
                                <td class="event-cell"><span class="style-icon">${styleIcon}</span>${tunRecord.event}</td>
                                <td>
                                    <div class="record-info">
                                        <div class="time-cell" style="color: #e30a17;">${tunRecord.time}</div>
                                        <div class="${tunisianSwimmerClass}">${tunRecord.swimmer}</div>
                                        <div class="record-details">
                                            <span class="country-flag">🇹🇳</span>Tunisia
                                            ${tunRecord.date ? ' • ' + tunRecord.date : ''}
                                            ${tunAgeIndicator}
                                            ${tunMissingInfo}
                                        </div>
                                    </div>
                                </td>
                                <td>
                                    ${compareRecord ? `
                                        <div class="record-info">
                                            <div class="time-cell" style="color: ${compareColor};">${compareRecord.time}</div>
                                            <div class="swimmer-name">${compareRecord.swimmer}</div>
                                            <div class="record-details">
                                                ${currentView === 'world' ? '🌍 ' : ''}${compareFlag ? '<span class="country-flag">' + compareFlag + '</span>' : ''}${compareCountry}
                                                ${compareRecord.date ? ' • ' + compareRecord.date : ''}
                                                ${compareAgeIndicator}
                                                ${compareMissingInfo}
                                            </div>
                                        </div>
                                    ` : '<span style="color: #999;">No data</span>'}
                                </td>
                                <td>${gapHtml}</td>
                            </tr>
                        `;
                    });
                }

                html += '</tbody></table>';
            }

            document.getElementById('recordsDisplay').innerHTML = html;
        }

        window.onload = loadRecords;
    </script>
</body>
</html>
